<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minigame</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Lilita+One&family=Passion+One:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(to bottom, #25BFED, #8AD2E6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Lilita One', 'Passion One', sans-serif;
        }

        .game-container {
            width: 500px;
            height: 200px;
            border: 3px solid #000;
            border-bottom: 20px solid #76BE7C;
            position: relative;
            overflow: hidden;
            background-image: url('https://http2.mlstatic.com/D_NQ_NP_858704-MLB31436124558_072019-O.webp');
            object-fit: fill;
        }

        #score {
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 15px;
            color: #333;
            background-color: #fff;
            padding: 10px;
            border-radius: 15px;
        }

        #player {
            width: 50px;
            height: 50px;
            position: absolute;
            bottom: 0;
            left: 50px;
        }

        /* Classe de animação do pulo */
        .jump {
            animation: jumpAnimation 0.5s linear;
        }

        @keyframes jumpAnimation {
            0% {
                bottom: 0;
            }

            50% {
                bottom: 100px;
            }

            /* Altura do pulo */
            100% {
                bottom: 0;
            }
        }

        #obstacle {
            width: 30px;
            height: 50px;
            background-image: url("https://cdn.creazilla.com/cliparts/789153/fire-hydrant-clipart-lg.png");
            background-size: cover;
            background-repeat: no-repeat;
            position: absolute;
            bottom: 0;
            right: -40px;
        }

        /* Classe que faz o obstáculo correr da direita para a esquerda */
        .obstacle-move {
            animation: obstacleAnimation 3s infinite linear;
        }

        @keyframes obstacleAnimation {
            0% {
                right: -40px;
            }

            100% {
                right: 1100px;
            }
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #game-over-screen h2 {
            font-weight: 100;
        }

        #game-over-screen button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Lilita One', 'Passion One', sans-serif;
        }
    </style>
</head>

<body>
    <div class="music">
            <audio id="background-music" autoplay loop>
                <source src="Patrulha-Canina-Brasil_Música-Temática.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

    <div class="game-container">
        <div id="score">Pontos: 0</div>
        <img id="player" src="corrida1.png" alt="Jogador">
        <div id="obstacle"></div>
        <div id="game-over-screen">
            <h2>Fim de Jogo!</h2>
            <button onclick="resetGame()">Jogar Novamente</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
