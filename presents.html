<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões de Presentes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body
    style="background-image: url('background.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <div class="background">
        <div class="background-top"></div>
        <span class="corner top-left"></span>
        <span class="corner top-right"></span>
        <span class="corner bottom-left"></span>
        <span class="corner bottom-right"></span>

        <svg viewBox="0 25 500 120" width="100%" height="50%">
            <path id="minhaCurva" d="M 50 150 Q 250 50 450 150" fill="transparent" />
            <text class="curved-text" font-size="40" fill="#dd60ad">
                <textPath href="#minhaCurva" startOffset="50%" text-anchor="middle">
                    Sugestões de Presentes
                </textPath>
            </text>
        </svg>

        <div class="gift-sugestions">
            <div class="sugestion">
                <img src="https://png.pngtree.com/png-vector/20230803/ourlarge/pngtree-pink-dress-clipart-pink-dress-with-bow-cartoon-vector-png-image_6868811.png"
                    alt="Sugestão 1">
                <div class="sugestion-text">
                    <h2>Roupas</h2>
                    <p>Tamanho: 4 ou 5 anos.</p>
                </div>
            </div>
            <div class="sugestion">
                <img src="https://img.magnific.com/vetores-premium/kids-footwear-pair-stylish-shoes-isolated-vector-illustration-on-white-background_1345572-9220.jpg?semt=ais_hybrid&w=740&q=80"
                    alt="Sugestão 2">
                <div class="sugestion-text">
                    <h2>Calçados</h2>
                    <p>Tamanho: 26/27.</p>
                </div>
            </div>
            <div class="sugestion">
                <img src="https://static.vecteezy.com/ti/vetor-gratis/p1/11202969-caixa-de-brinquedos-rosa-gratis-vetor.jpg"
                    alt="Sugestão 3">
                <div class="sugestion-text">
                    <h2>Brinquedos</h2>
                    <p>Brinquedos no geral.</p>
                </div>
            </div>
        </div>

        <div class="background-bottom"></div>
    </div>
</body>

</html>
